<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PuruAI — Chat Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.5 8.5L20 7L15.5 12L20 17L13.5 15.5L12 22L10.5 15.5L4 17L8.5 12L4 7L10.5 8.5L12 2Z" fill="currentColor"/>
          </svg>
        </div>
        <span class="logo-text">PuruAI</span>
      </div>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <span class="btn-icon">+</span>
      <span>Chat Baru</span>
    </button>

    <div class="sidebar-section">
      <div class="section-label">Riwayat</div>
      <div class="history-list" id="historyList">
        <div class="history-empty">
          <span>Belum ada riwayat</span>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="model-badge">
        <div class="model-dot"></div>
        <span>Gemini Powered</span>
      </div>
      <div class="version-text">PuruAI v1.0</div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-layout">

    <!-- Topbar -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">
        <div class="status-dot"></div>
        <span>PuruAI</span>
      </div>
      <button class="clear-btn" onclick="clearChat()" title="Hapus percakapan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
    </header>

    <!-- Chat Area -->
    <div class="chat-container" id="chatContainer">
      <!-- Welcome Screen -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.5 8.5L20 7L15.5 12L20 17L13.5 15.5L12 22L10.5 15.5L4 17L8.5 12L4 7L10.5 8.5L12 2Z" fill="currentColor"/>
          </svg>
        </div>
        <h1 class="welcome-title">Halo, saya <span class="gradient-text">PuruAI</span></h1>
        <p class="welcome-sub">Asisten AI yang siap membantu kamu.<br/>Tanya apa saja, saya akan jawab.</p>
        <div class="suggestion-grid">
          <button class="suggestion-card" onclick="sendSuggestion('Jelaskan cara kerja kecerdasan buatan')">
            <div class="sug-icon">🤖</div>
            <div class="sug-text">Cara kerja AI</div>
          </button>
          <button class="suggestion-card" onclick="sendSuggestion('Buatkan saya puisi tentang teknologi')">
            <div class="sug-icon">✍️</div>
            <div class="sug-text">Tulis puisi</div>
          </button>
          <button class="suggestion-card" onclick="sendSuggestion('Tips produktivitas untuk developer')">
            <div class="sug-icon">⚡</div>
            <div class="sug-text">Tips developer</div>
          </button>
          <button class="suggestion-card" onclick="sendSuggestion('Apa perbedaan antara Python dan JavaScript?')">
            <div class="sug-icon">💻</div>
            <div class="sug-text">Python vs JS</div>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-wrapper" id="messagesWrapper"></div>

      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typingIndicator">
        <div class="message assistant-message">
          <div class="message-avatar">
            <div class="avatar-ai pulse-avatar">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L13.5 8.5L20 7L15.5 12L20 17L13.5 15.5L12 22L10.5 15.5L4 17L8.5 12L4 7L10.5 8.5L12 2Z" fill="currentColor"/>
              </svg>
            </div>
          </div>
          <div class="message-body">
            <div class="message-name">PuruAI</div>
            <div class="message-bubble ai-bubble typing-bubble">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <form class="input-form" id="chatForm" 
            hx-post="/api/chat"
            hx-target="#messagesWrapper"
            hx-swap="beforeend"
            hx-on::before-request="onBeforeRequest()"
            hx-on::after-request="onAfterRequest(event)">
        <input type="hidden" name="messages" id="messagesInput" />
        <div class="input-wrapper">
          <textarea 
            id="userInput"
            class="chat-input"
            placeholder="Tulis pesan kamu di sini..."
            rows="1"
            maxlength="4000"
            onkeydown="handleKeyDown(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button type="submit" class="send-btn" id="sendBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span class="char-count" id="charCount">0 / 4000</span>
          <span class="input-hint">Enter untuk kirim · Shift+Enter untuk baris baru</span>
        </div>
      </form>
    </div>

  </main>

  <!-- Overlay -->
  <div class="overlay hidden" id="overlay" onclick="closeSidebar()"></div>

  <script src="/js/app.js"></script>
</body>
</html>
