<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0a12"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="description" content="PurAI – Your intelligent companion"/>
<title>PurAI</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg"/>

<meta name="robots" content="noindex,nofollow"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<!-- HTMX -->
<script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-ujb1lZYygJmzgSwoxRggbCHcjc0rB2uH1/vpiQB3gMi8PBBqfBJBj9lzGUb0Ber" crossorigin="anonymous"></script>
<!-- Markdown + Sanitizer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>

<link rel="stylesheet" href="/css/main.css"/>
</head>
<body>

<!-- ░░ ANTI-RE TRAP ░░ -->
<div id="__purai_trap" style="display:none" aria-hidden="true"></div>

<!-- ░░ APP SHELL ░░ -->
<div id="app">

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">
        <span class="logo-icon">✦</span>
        <span class="logo-text">PurAI</span>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()" aria-label="Close sidebar">✕</button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="newChat()">
        <span class="nav-icon">＋</span>
        <span>New Chat</span>
      </button>
    </nav>

    <div class="history-section">
      <p class="history-label">Recent</p>
      <div id="history-list" class="history-list">
        <!-- populated by JS -->
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="model-selector">
        <label for="model-select" class="model-label">Model</label>
        <select id="model-select" class="model-select" onchange="updateModel(this.value)">
          <option value="gemini-3-flash-preview">Gemini 3 Flash ⚡</option>
          <option value="TA/deepseek-ai/DeepSeek-R1">DeepSeek R1 🧠</option>
          <option value="gpt-5-mini">GPT-5 Mini 🤖</option>
        </select>
      </div>
      <div class="mode-selector">
        <label class="mode-label">Mode</label>
        <div class="mode-chips">
          <button class="mode-chip active" data-mode="standard" onclick="setMode('standard',this)">Standard</button>
          <button class="mode-chip" data-mode="deep_think" onclick="setMode('deep_think',this)">Deep Think</button>
          <button class="mode-chip" data-mode="guided_learning" onclick="setMode('guided_learning',this)">Guided</button>
        </div>
      </div>
      <div class="system-prompt-section">
        <label class="mode-label" for="system-prompt-input">
          System Prompt
          <span id="sys-prompt-badge" class="sys-badge hidden">✦ Aktif</span>
        </label>
        <textarea
          id="system-prompt-input"
          class="system-prompt-textarea"
          placeholder="Contoh: Kamu adalah asisten coding expert. Selalu jawab dalam Bahasa Indonesia."
          maxlength="2048"
          rows="3"
          oninput="updateSystemPrompt(this.value)"
        ></textarea>
        <div class="sys-prompt-footer">
          <span id="sys-char-count" class="char-count">0/2048</span>
          <button class="sys-clear-btn" onclick="clearSystemPrompt()" title="Hapus system prompt">Hapus</button>
        </div>
      </div>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title">
        <span class="top-logo">✦ PurAI</span>
        <span id="model-badge" class="model-badge">Gemini 3 Flash</span>
      </div>
      <button class="topbar-new" onclick="newChat()" title="New Chat">✦</button>
    </header>

    <!-- MESSAGES AREA -->
    <div id="messages" class="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-icon">✦</div>
        <h1 class="welcome-title">PurAI</h1>
        <p class="welcome-sub">Your intelligent companion.<br/>Ask anything.</p>
        <div class="suggestion-grid">
          <button class="suggestion-chip" onclick="fillPrompt('Jelaskan konsep machine learning dengan sederhana')">🧠 Apa itu Machine Learning?</button>
          <button class="suggestion-chip" onclick="fillPrompt('Buatkan kode Python untuk web scraping')">💻 Kode Python scraping</button>
          <button class="suggestion-chip" onclick="fillPrompt('Tuliskan email profesional untuk melamar kerja')">✉️ Email lamaran kerja</button>
          <button class="suggestion-chip" onclick="fillPrompt('Apa tren teknologi AI terbaru 2025?')">🚀 Tren AI 2025</button>
        </div>
      </div>
    </div>

    <!-- TYPING INDICATOR -->
    <div id="typing-indicator" class="typing-indicator hidden">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <form id="chat-form" class="input-form">
        <input type="hidden" name="model" id="form-model" value="gemini-3-flash-preview"/>
        <input type="hidden" name="chat_mode" id="form-mode" value="standard"/>
        <input type="hidden" name="system_prompt" id="form-system-prompt" value=""/>

        <div class="input-wrapper">
          <textarea
            id="prompt-input"
            name="prompt"
            class="prompt-textarea"
            placeholder="Tanyakan sesuatu..."
            rows="1"
            maxlength="4096"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
            aria-label="Your message"
          ></textarea>

          <div class="input-actions">
            <span id="char-count" class="char-count">0/4096</span>
            <button type="submit" id="send-btn" class="send-btn" aria-label="Send">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </div>
      </form>
      <p class="disclaimer">PurAI dapat membuat kesalahan. Periksa informasi penting.</p>
    </div>

  </main>
</div>

<!-- Token injection (obfuscated XOR, sama seperti versi Python) -->
<script>
(function(){
  var _k=7,_s="{{ csrf_token }}".split("").map(function(c,i){return String.fromCharCode(c.charCodeAt(0)^(i%_k));}).join("");
  window.__p=_s.split("").map(function(c,i){return String.fromCharCode(c.charCodeAt(0)^(i%_k));}).join("");
})();
</script>

<script src="/js/anti-re.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
