<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PurAI – Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- marked.js for markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <!-- htmx -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.10/htmx.min.js"></script>
</head>
<body>

<div class="app-shell">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">P</div>
      <div class="brand">
        <span class="brand-name">PurAI</span>
        <span class="brand-sub">powered by Puruboy</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="status-pill">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
      <select id="model-select" class="model-select">
        <option value="gemini-3-flash-preview">Gemini 3 Flash</option>
        <option value="gemini-2.0-flash">Gemini 2.0</option>
        <option value="gpt-4o-mini">GPT-4o Mini</option>
      </select>
    </div>
  </header>

  <!-- Chat area -->
  <main class="chat-area" id="chat-area">
    <!-- Welcome state -->
    <div class="welcome-state" id="welcome-state">
      <div class="welcome-logo">P</div>
      <h1 class="welcome-title">Halo, saya PurAI</h1>
      <p class="welcome-sub">Asisten AI cerdas siap membantu Anda kapan saja</p>
      <div class="suggestion-chips">
        <button class="chip" onclick="fillPrompt('Jelaskan konsep machine learning dengan sederhana')">🧠 Machine Learning</button>
        <button class="chip" onclick="fillPrompt('Buatkan kode Python untuk sorting algoritma')">💻 Kode Python</button>
        <button class="chip" onclick="fillPrompt('Apa tren teknologi AI terbaru di 2025?')">🚀 Tren AI 2025</button>
        <button class="chip" onclick="fillPrompt('Bantu saya membuat rencana belajar pemrograman')">📚 Rencana Belajar</button>
      </div>
    </div>

    <!-- Messages container -->
    <div id="messages"></div>
    <div id="scroll-anchor"></div>
  </main>

  <!-- Input bar -->
  <footer class="input-bar">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        class="msg-input"
        placeholder="Kirim pesan..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="disclaimer">PurAI dapat membuat kesalahan. Verifikasi informasi penting.</p>
  </footer>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
